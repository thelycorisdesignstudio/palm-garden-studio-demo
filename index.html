    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              sage: '#7C9473',
              'deep-green': '#2D4A2B',
              forest: '#1A2E1A',
              cream: '#F8F6F0',
              sand: '#E8DCC4',
              terracotta: '#C45A3C',
              gold: '#D4A574',
              charcoal: '#1C1C1C',

    <style>
      ::selection {
        background: #7C9473;
        color: white;
      }
      
      html, body {
        height: auto;
        min-height: 100%;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: #F8F6F0;
        color: #1C1C1C;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-weight-smoothing: grayscale;
        scrollbar-gutter: stable;
      }

      /* Standard Scroll Lock - Much more stable than position:fixed */
      body.is-locked {
        overflow: hidden !important;
        touch-action: none;
      }

      .grain-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        opacity: 0.03;
        pointer-events: none;
        z-index: 9999;
      }

      .will-change-scroll {
        will-change: transform;
      }
    </style>
